name: 'Publish updated packages'
description: 'Publish npm packages whose version is newer than the registry, plus optional VS Code extensions to VS Marketplace and Open VSX.'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  npm-packages:
    description: 'Newline-separated package directories to publish to npm.'
    required: false
    default: ''
  vscode-packages:
    description: 'Newline-separated extension directories to publish to VS Marketplace and Open VSX.'
    required: false
    default: ''
  dry-run:
    description: 'Log what would be published without actually publishing.'
    required: false
    default: 'false'
  npm-token:
    description: 'npm auth token. Leave empty to use OIDC trusted publishing with --provenance.'
    required: false
    default: ''
  vsce-token:
    description: 'VS Marketplace (vsce) personal access token.'
    required: false
    default: ''
  ovsx-token:
    description: 'Open VSX access token.'
    required: false
    default: ''
  vsce-version:
    description: 'Version of the vsce CLI to use (e.g. "1.2.3" or "latest").'
    required: false
    default: 'latest'
  ovsx-version:
    description: 'Version of the ovsx CLI to use (e.g. "1.2.3" or "latest").'
    required: false
    default: 'latest'

runs:
  using: 'node20'
  main: 'dist/index.js'
